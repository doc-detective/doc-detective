<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-tab home</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .actions { margin-top: 16px; display: flex; gap: 12px; }
    a, button { font-size: 16px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1 id="home-marker">MULTI-TAB HOME</h1>
  <p>Fixture page for browser multi-tab and multi-window tests (multi-surface Phase 3).</p>
  <div class="actions">
    <a id="open-link" href="/multi-tab-child.html?page=linked" target="_blank" rel="opener">Open child in new tab</a>
    <button id="open-window" type="button"
      onclick="window.open('/multi-tab-child.html?page=opened', '_blank')">Open child via window.open</button>
  </div>
</body>
</html>
