# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  request_changes_workflow: true
  high_level_summary: true
  poem: true
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    drafts: false
    auto_pause_after_reviewed_commits: 0
    # Promptless opens docs-only PRs that are reviewed separately; skip
    # CodeRabbit auto-review on them to avoid noise.
    ignore_usernames:
      - "promptless[bot]"
  path_filters:
    # Generated schema artifacts (regenerated by build:common) — not reviewable.
    - "!src/common/src/schemas/output_schemas/**"
    - "!src/common/src/schemas/schemas.json"
    # docs/** is intentionally INCLUDED so docs and their inline Doc Detective
    # tests get reviewed.
  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
chat:
  auto_reply: true