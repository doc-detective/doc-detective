# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

############
# Basic info
############

instances:
  - url: doc-detective.docs.buildwithfern.com # {yourorg}.docs.buildwithfern.com
    custom-domain: docs.doc-detective.com # custom domain for live site

title: Doc Detective

ai-search:
  location:
    - docs

##########
# Branding
##########

logo:
  href: https://doc-detective.docs.buildwithfern.com
  dark: assets/logo/doc-detective.svg
  light: assets/logo/doc-detective.svg
  height: 40

colors:
  accentPrimary:
    dark: "#3EB16E"
    light: "#22623D"
  background:
    light: "#ffffff"
    dark: "#0d0e11"

favicon: assets/logo/favicon.ico

#########
# Socials
#########

metadata:
  # Core platform identity
  og:site_name: "Doc Detective | Documentation"
  og:title: "Doc Detective | Documentation content testing framework"
  og:description: "A documentation content testing framework that simplifies the process of keeping your docs accurate and up-to-date."
  og:url: "https://doc-detective.com"
#
#  # Social sharing assets
#
#  og:image: "https://developer.squareup.com/images/docs-social-card.png"
#  og:image:width: 1200
#  og:image:height: 630
#  og:locale: "en_US"
#  og:logo: "https://developer.squareup.com/images/square-logo.png"

########
# Layout
########

layout:
  searchbar-placement: header
  tabs-placement: header

tabs:
  home:
    display-name: Home
    icon: fa-solid fa-home
  docs:
    display-name: Documentation
    icon: fa-solid fa-file
    slug: docs
  ai:
    display-name: AI & Agents
    icon: fa-solid fa-robot
    slug: ai
  reference:
    display-name: Reference
    icon: fa-solid fa-line-columns
    slug: reference
  contribute:
    display-name: Contribute
    icon: fa-solid fa-code-pull-request
    slug: contribute
  support:
    display-name: Support
    icon: fa-solid fa-heart

navbar-links:
  - type: minimal
    text: Discord
    href: https://discord.gg/2M7wXEThfF
    target: _blank
    icon: fa-brands fa-discord
  - type: github
    value: https://github.com/doc-detective/doc-detective

footer-links:
  github: https://github.com/doc-detective
  linkedin: https://www.linkedin.com/company/doc-detective
  discord: https://discord.gg/2M7wXEThfF

######################
# Navigation structure
######################

navigation:
  - tab: home
    layout:
      - section: Home
        contents:
          - page: Welcome
            path: pages/index.mdx

  - tab: docs
    layout:
      - section: Get started
        slug: get-started
        contents:
          - page: Introduction
            path: pages/docs/intro.mdx
            slug: introduction
          - page: Installation
            path: pages/docs/get-started/installation.mdx
            slug: installation
          - page: Concepts
            path: pages/docs/get-started/concepts.mdx
            slug: concepts
          - page: Create your first test
            path: pages/docs/get-started/create-your-first-test.mdx
            slug: create-your-first-test
          - page: How testing works
            path: pages/docs/tests/overview.mdx
            slug: how-testing-works
          - page: Sample tests
            path: pages/docs/get-started/sample-tests.mdx
            slug: sample-tests

      - section: Test your docs
        slug: test-docs
        contents:
          - page: Overview
            path: pages/docs/test-docs/overview.mdx
            slug: overview
          - page: Inline tests
            path: pages/docs/tests/inline.mdx
            slug: inline
          - page: Detected tests
            path: pages/docs/tests/detected.mdx
            slug: detected
          - page: Standalone tests
            path: pages/docs/tests/standalone.mdx
            slug: standalone
          # Surface sub-sections are visual groupers only (skip-slug keeps page
          # URLs flat under /docs/test-docs/…). See docs/content-strategy/
          # information-architecture.md — one "Test your docs" track, split by
          # the interface the documented procedure drives.
          - section: UI procedures
            skip-slug: true
            contents:
              - page: Fill fields
                path: pages/tutorials/fill-fields.mdx
                slug: fill-fields
              - section: Screenshots
                skip-slug: true
                contents:
                  - page: Capture screenshots
                    path: pages/docs/test-docs/capture-screenshots-guide.mdx
                    slug: capture-screenshots-guide
                  - page: Screenshot visual regression
                    path: pages/docs/test-docs/screenshot-visual-regression.mdx
                    slug: screenshot-visual-regression
                  - page: Automatic screenshots
                    path: pages/docs/test-docs/automatic-screenshots.mdx
                    slug: automatic-screenshots
                  - page: Annotate screenshots
                    path: pages/docs/test-docs/annotate-screenshots.mdx
                    slug: annotate-screenshots
                  - page: Screenshot example
                    path: pages/tutorials/capture-screenshot.mdx
                    slug: capture-screenshots
              - section: Recording
                skip-slug: true
                contents:
                  - page: Record video
                    path: pages/docs/test-docs/record-video-guide.mdx
                    slug: record-video-guide
                  - page: Video visual regression
                    path: pages/docs/test-docs/video-visual-regression.mdx
                    slug: video-visual-regression
                  - page: Automatic recording
                    path: pages/docs/test-docs/automatic-recording.mdx
                    slug: automatic-recording
                  - page: Narrate recordings
                    path: pages/docs/test-docs/narrate-recordings.mdx
                    slug: narrate-recordings
                  - page: Recording example
                    path: pages/tutorials/record-video.mdx
                    slug: record-video
              - page: Multiple tabs, windows & browsers
                path: pages/tutorials/multiple-tabs-and-windows.mdx
                slug: multiple-tabs-and-windows
              - section: Native & mobile apps (experimental)
                skip-slug: true
                contents:
                  - page: Native Windows apps
                    path: pages/docs/test-docs/native-apps/windows.mdx
                    slug: native-windows-apps
                  - page: Native macOS apps
                    path: pages/docs/test-docs/native-apps/macos.mdx
                    slug: native-macos-apps
                  - page: Android apps
                    path: pages/docs/test-docs/native-apps/android.mdx
                    slug: android-apps
                  - page: iOS apps
                    path: pages/docs/test-docs/native-apps/ios.mdx
                    slug: ios-apps
          - section: CLI, code & APIs
            skip-slug: true
            contents:
              - page: Run shell & code
                path: pages/docs/test-code/run-shell-and-code.mdx
                slug: run-shell-and-code
              - page: HTTP & APIs
                path: pages/docs/test-code/http-and-api.mdx
                slug: http-and-api
              - page: Generate requests from OpenAPI
                path: pages/docs/test-code/generate-tests-from-openapi.mdx
                slug: generate-tests-from-openapi
              - page: Integrations
                path: pages/docs/get-started/integrations.mdx
                slug: integrations
          - section: Formats & surfaces
            skip-slug: true
            contents:
              - section: Input formats
                slug: input-formats
                contents:
                  - page: Overview
                    path: pages/docs/input-formats/overview.mdx
                    slug: overview
                  - page: Markdown
                    path: pages/docs/input-formats/markdown.mdx
                    slug: markdown
                  - page: DITA
                    path: pages/docs/input-formats/dita.mdx
                    slug: dita
                  - page: AsciiDoc
                    path: pages/docs/input-formats/asciidoc.mdx
                    slug: asciidoc
                  - page: HTML
                    path: pages/docs/input-formats/html.mdx
                    slug: html
                  - page: Custom
                    path: pages/docs/input-formats/custom.mdx
                    slug: custom
                  - page: Selectors
                    path: pages/docs/input-formats/selectors.mdx
                    slug: selectors
              - page: Test across platforms & browsers
                path: pages/docs/config/contexts.mdx
                slug: platforms-and-browsers
              - page: Heretto
                path: pages/docs/integrations/heretto.mdx
                slug: heretto

      - section: Run in CI & at scale
        slug: ci
        contents:
          - page: Overview
            path: pages/docs/ci/overview.mdx
            slug: overview
          - page: GitHub Action
            path: pages/docs/ci/github-action.mdx
            slug: github-action
          - page: Set up your test environment
            path: pages/tutorials/set-up-your-test-environment.mdx
            slug: set-up-environment
          - page: Reporters & artifacts
            path: pages/docs/ci/reporters-and-artifacts.mdx
            slug: reporters-and-artifacts
          - page: Docker & headless
            path: pages/docs/ci/docker-and-headless.mdx
            slug: docker-and-headless

      - section: Troubleshoot
        slug: troubleshoot
        contents:
          - page: Troubleshoot a failing or flaky test
            path: pages/docs/troubleshoot/overview.mdx
            slug: overview

      - folder: pages/docs/actions
        title: Actions

      - section: Selectors
        contents:
          - page: CSS selectors
            path: pages/docs/selectors/css.mdx
            slug: css
          - page: XPath selectors
            path: pages/docs/selectors/xpath.mdx
            slug: xpath

      - section: Troubleshooting
        contents:
          - page: Setup issues
            path: pages/docs/troubleshooting/setup-issues.mdx
            slug: setup-issues

  - tab: ai
    layout:
      - section: AI & Agents
        contents:
          - page: Overview
            path: pages/docs/agent-tools/overview.mdx
            slug: overview
          - page: Claude Code
            path: pages/docs/agent-tools/claude-code.mdx
            slug: claude-code
          - page: Copilot CLI
            path: pages/docs/agent-tools/copilot-cli.mdx
            slug: copilot-cli
          - page: Gemini CLI
            path: pages/docs/agent-tools/gemini-cli.mdx
            slug: gemini-cli
          - page: Other assistants
            path: pages/docs/agent-tools/other-assistants.mdx
            slug: other-assistants
          - page: Agent tools & MCP
            path: pages/ai/agent-tools-and-mcp.mdx
            slug: agent-tools-and-mcp
          - page: Self-healing
            path: pages/docs/get-started/self-healing.mdx
            slug: self-healing

  - tab: reference
    layout:
      - section: Reference
        contents:
          - page: Glossary
            path: pages/reference/glossary.mdx
            slug: glossary
          - page: Expressions
            path: pages/reference/expressions.mdx
            slug: expressions
          - page: CLI commands and flags
            path: pages/reference/cli.mdx
            slug: cli
          - section: CLI
            contents:
              - page: install
                path: pages/reference/cli/install.mdx
                slug: install
      - folder: pages/reference/schemas
        title: Schemas

  - tab: contribute
    layout:
      - section: Contribute
        contents:
          - page: Contribute to the docs
            path: pages/contribute/index.mdx
            slug: index
          - page: Quick start
            path: pages/contribute/quick-start.mdx
            slug: quick-start
          - page: Standard contributions
            path: pages/contribute/standard-contributions.mdx
            slug: standard-contributions
          - page: Substantial contributions
            path: pages/contribute/substantial-contributions.mdx
            slug: substantial-contributions
          - page: Local development
            path: pages/contribute/local-development.mdx
            slug: local-development
          - page: Review process
            path: pages/contribute/review-process.mdx
            slug: review-process
          - page: Testing the docs
            path: pages/contribute/testing.mdx
            slug: testing
          - section: Content templates
            contents:
              - page: How-to template
                path: pages/contribute/templates/how-to.mdx
                slug: how-to
              - page: Tutorial template
                path: pages/contribute/templates/tutorial.mdx
                slug: tutorial
              - page: Reference template
                path: pages/contribute/templates/reference.mdx
                slug: reference
              - page: Feature template
                path: pages/contribute/templates/feature.mdx
                slug: feature
              - page: Troubleshooting template
                path: pages/contribute/templates/troubleshooting.mdx
                slug: troubleshooting
          - folder: pages/contribute/repos
            title: Repository guides

  - tab: support
    layout:
      - section: Support
        contents:
          - page: Support
            path: pages/support.mdx
          - page: Resources
            path: pages/docs/get-started/resources.mdx
            slug: /resources
          - page: Telemetry and data collection
            path: pages/legal/telemetry.mdx
            slug: /legal/telemetry
          - page: Privacy policy (Companion app)
            path: pages/legal/privacy-policy-companion.mdx
            slug: /legal/privacy-policy-companion

###########
# Redirects
###########

redirects:
  # Get started split
  - source: /docs/introduction
    destination: /docs/get-started/introduction
  # Tests → split across tracks
  - source: /docs/tests
    destination: /docs/get-started/how-testing-works
  - source: /docs/tests/overview
    destination: /docs/get-started/how-testing-works
  - source: /docs/tests/inline-tests
    destination: /docs/test-docs/inline
  - source: /docs/tests/inline
    destination: /docs/test-docs/inline
  - source: /docs/tests/detected-tests
    destination: /docs/test-docs/detected
  - source: /docs/tests/detected
    destination: /docs/test-docs/detected
  - source: /docs/tests/standalone-tests
    destination: /docs/test-docs/standalone
  - source: /docs/tests/standalone
    destination: /docs/test-docs/standalone
  # Test code & APIs track dissolved into the "Test your docs" umbrella
  # (CLI, code & APIs sub-section). Redirect the former /docs/test-code/* URLs.
  - source: /docs/test-code
    destination: /docs/test-docs/overview
  - source: /docs/test-code/overview
    destination: /docs/test-docs/overview
  - source: /docs/test-code/standalone
    destination: /docs/test-docs/standalone
  - source: /docs/test-code/run-shell-and-code
    destination: /docs/test-docs/run-shell-and-code
  - source: /docs/test-code/http-and-api
    destination: /docs/test-docs/http-and-api
  - source: /docs/test-code/integrations
    destination: /docs/test-docs/integrations
  # Input formats → Test your docs (explicit; Fern redirects match literal paths)
  - source: /docs/input-formats/overview
    destination: /docs/test-docs/input-formats/overview
  - source: /docs/input-formats/markdown
    destination: /docs/test-docs/input-formats/markdown
  - source: /docs/input-formats/dita
    destination: /docs/test-docs/input-formats/dita
  - source: /docs/input-formats/asciidoc
    destination: /docs/test-docs/input-formats/asciidoc
  - source: /docs/input-formats/html
    destination: /docs/test-docs/input-formats/html
  - source: /docs/input-formats/custom
    destination: /docs/test-docs/input-formats/custom
  # Integrations / contexts → tracks
  - source: /docs/integrations/heretto
    destination: /docs/test-docs/heretto
  - source: /docs/configuration/contexts
    destination: /docs/test-docs/platforms-and-browsers
  # Get started → CI / Test your docs / AI / Support
  - source: /docs/get-started/ci
    destination: /docs/ci/github-action
  - source: /docs/get-started/integrations
    destination: /docs/test-docs/integrations
  - source: /docs/get-started/self-healing
    destination: /ai/self-healing
  - source: /docs/get-started/resources
    destination: /resources
  # Agent tools → AI & Agents pillar
  - source: /docs/agent-tools/overview
    destination: /ai/overview
  - source: /docs/agent-tools/claude-code
    destination: /ai/claude-code
  - source: /docs/agent-tools/copilot-cli
    destination: /ai/copilot-cli
  - source: /docs/agent-tools/gemini-cli
    destination: /ai/gemini-cli
  - source: /docs/agent-tools/other-assistants
    destination: /ai/other-assistants
  # Tutorials tab dissolved into tracks
  - source: /tutorials
    destination: /docs/test-docs/overview
  - source: /tutorials/capture-screenshot
    destination: /docs/test-docs/capture-screenshots
  - source: /tutorials/fill-fields
    destination: /docs/test-docs/fill-fields
  - source: /tutorials/record-video
    destination: /docs/test-docs/record-video
  - source: /tutorials/set-up-your-test-environment
    destination: /docs/ci/set-up-environment
  # Contribute → own tab (explicit; Fern redirects match literal paths)
  - source: /docs/contribute/contribute-to-the-docs
    destination: /contribute/index
  - source: /docs/contribute/quick-start
    destination: /contribute/quick-start
  - source: /docs/contribute/standard-contributions
    destination: /contribute/standard-contributions
  - source: /docs/contribute/substantial-contributions
    destination: /contribute/substantial-contributions
  - source: /docs/contribute/local-development
    destination: /contribute/local-development
  - source: /docs/contribute/review-process
    destination: /contribute/review-process
  - source: /docs/contribute/testing
    destination: /contribute/testing
  - source: /docs/contribute/how-to
    destination: /contribute/how-to
  - source: /docs/contribute/tutorial
    destination: /contribute/tutorial
  - source: /docs/contribute/reference
    destination: /contribute/reference
  - source: /docs/contribute/feature
    destination: /contribute/feature
  - source: /docs/contribute/troubleshooting
    destination: /contribute/troubleshooting
  # Legal → Support
  - source: /docs/legal/privacy-policy-companion-app
    destination: /legal/privacy-policy-companion
