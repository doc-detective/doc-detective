StylesPath = .vale/styles

Vocab = Docs

MinAlertLevel = suggestion

Packages = MDX, Google, alex, Joblint

# Lint only the published Fern content pages. Internal working docs (content
# strategy, CLAUDE.md, AGENTS.md, repo skills, src/**) are not end-user pages and
# aren't held to the published-docs style guide.
[**/fern/pages/**/*.{md,mdx}]
BasedOnStyles = Vale, Google, alex, Joblint, DocDetective

Vale.Terms = NO

# Relax some rules for technical documentation
# Google.Headings is too strict for camelCase API terms like runCode, goTo, etc.
Google.Headings = warning

# Google.Quotes requires American punctuation style which can conflict with
# code examples and technical terms - relax to warning
Google.Quotes = warning

# Vale.Spelling doesn't respect vocabulary in frontmatter/titles
# Relax to warning for technical docs with API terms
Vale.Spelling = warning

# Disable rules that are too strict for technical documentation
# CLI is standard terminology, "Execute" and "fail" are common tech terms,
# and parentheses are often needed for technical explanations
Google.WordList = NO
Google.Parens = NO
Google.Acronyms = NO
alex.ProfanityUnlikely = NO
Joblint.Competitive = NO

# Generated schema reference pages (built by docs/.scripts/buildSchemaReferencesV4.js)
# are machine output: their prose comes verbatim from JSON Schema descriptions and they
# list code identifiers. Don't prose-lint generated files — fixes belong in the schema.
# BasedOnStyles clears the packages; the rules below are cleared because they're enabled
# explicitly in the section above and would otherwise still apply.
[**/fern/pages/reference/schemas/*.mdx]
BasedOnStyles =
Vale.Spelling = NO
Google.Headings = NO
Google.Quotes = NO
Google.Passive = NO
Google.Latin = NO

# The generated CLI reference page (built by docs/.scripts/buildCliReference.js)
# is machine output too: its flag/command prose comes verbatim from the yargs
# `.option()` descriptions in src/**. Don't prose-lint it — fixes belong in the
# CLI source, not the generated page.
[**/fern/pages/reference/cli.mdx]
BasedOnStyles =
Vale.Spelling = NO
Google.Headings = NO
Google.Quotes = NO
Google.Passive = NO
Google.Latin = NO
