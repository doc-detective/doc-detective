# Runs Doc Detective against the documentation so the inline tests embedded in
# the docs (the docs-as-tests pattern) execute on every docs change. A single
# Doc Detective Action picks up and runs all tests under docs/fern/pages and
# fails the job on any FAIL (exit_on_fail).
#
# It runs the repo's OWN build (build + `npm link`, then the Action with an empty
# `version` so bare `npx doc-detective` resolves the linked local build) rather
# than the published package: the docs describe the code in this repo, so they
# must be tested against it — not against whatever happens to be released.
name: Test docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/test-docs.yml"
  workflow_dispatch:

concurrency:
  group: test-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-docs:
    name: Test docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - name: Link local build
        run: npm link

      - name: Run Doc Detective on the docs
        uses: doc-detective/github-action@f2ec2be7f8aefbb9c2457b3211610364c7bd14b1 # ios WDA cache key v2 (github-action#74)
        with:
          version: "" # bare npx doc-detective -> the linked local build above
          config: docs/.doc-detective.json
          input: docs/fern/pages
          exit_on_fail: true
