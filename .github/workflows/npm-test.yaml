# PR gate: runs the reusable test matrix on pull requests so reviewers see
# matrix failures before merge. All release-side work (publish, smoke-test
# staged build, promote to @latest, Docker build) lives in
# .github/workflows/release.yml, which has a linear needs-chain that only
# advances @latest after the smoke test passes.

name: Test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    # Run the full matrix when product code, tests, or the build/dependency
    # inputs change. `test/**` is included so a PR that only adds or edits tests
    # (e.g. coverage tests, fixtures) is actually exercised on every OS before
    # merge — previously those PRs silently skipped the matrix and the
    # coverage-merge ratchet, and had to be verified via `workflow_dispatch`.
    # `coverage-thresholds.json` is included so a ratchet re-baseline is verified
    # against the union too. `src/**` also covers the doc-detective-common
    # workspace (src/common). Docs-only / samples-only PRs still skip; use
    # `workflow_dispatch` on demand for those.
    paths:
      - 'src/**'
      - 'test/**'
      - 'coverage-thresholds.json'
      - 'package.json'
      - 'package-lock.json'
      - 'bin/**'
      - 'scripts/**'
      # Mocha runner config governs how the whole suite executes (timeouts,
      # hooks), so a change to it must re-run the matrix — otherwise a
      # test-behavior change like the default-timeout bump ships unexercised.
      - '.mocharc.yml'
      - '.github/workflows/npm-test.yaml'
      - '.github/workflows/test.yml'
      # The fixture matrix is half the PR gate; a change to it must run it.
      # Without this entry a fixtures.yml-only PR merges unexercised.
      - '.github/workflows/fixtures.yml'
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Granted so the reusable fixtures workflow's `select` job can read the PR's
  # changed files to narrow its matrix (ADR 01055). A reusable workflow can't
  # hold a permission the caller doesn't grant, so it lives here.
  pull-requests: read

jobs:
  # Smoke + unit/integration matrix (mocha) and the coverage ratchets. The bulk
  # of the *.spec.json fixtures no longer run here — see the `fixtures` job.
  test:
    uses: ./.github/workflows/test.yml
    secrets:
      # Only forward HERETTO_* on trusted contexts (manual dispatch). PR
      # runs — especially from forks — receive empty strings, so the
      # called workflow never has access to the real values.
      HERETTO_ORG_ID: ${{ github.event_name == 'workflow_dispatch' && secrets.HERETTO_ORG_ID || '' }}
      HERETTO_USERNAME: ${{ github.event_name == 'workflow_dispatch' && secrets.HERETTO_USERNAME || '' }}
      HERETTO_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.HERETTO_TOKEN || '' }}

  # Per-feature Doc Detective fixtures, fanned out one small job per (bundle x
  # OS) so no single job is a 90-minute monolith. Runs the PR's own build. The
  # reusable workflow computes its own matrix (its `select` job), narrowed to
  # the bundles the PR's change set can affect (ADR 01055).
  fixtures:
    uses: ./.github/workflows/fixtures.yml
