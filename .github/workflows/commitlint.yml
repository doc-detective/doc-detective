name: Commitlint

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci --ignore-scripts
        env:
          # Husky installs the commit-msg hook via `prepare`. The lint job
          # doesn't run git commits, so skip it along with all other
          # postinstall work (browsers, drivers) to keep the job fast.
          HUSKY: '0'

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
