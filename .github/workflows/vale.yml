name: Vale style check
on: 
  pull_request:
    paths:
      - '**.mdx'
      - '**.md'
      - '.vale/**'
      - '.vale.ini'
      - '!**/changelog/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    if: |
      github.event.pull_request.user.login != 'github-actions'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Install mdx2vast
        run: |
          npm i -g mdx2vast

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@7dee1b0c1557f278e5c7dc244927139d78c0e22a #v47.0.4
        with:
          files: |
            docs/fern/**/*.md
            docs/fern/**/*.mdx
          # Generated schema reference pages are excluded here and again via --glob
          # below; see the note on the Run vale step for why they can't be parsed.
          files_ignore: |
            **/changelog/**
            docs/fern/pages/reference/schemas/**

      - name: Run vale
        uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c #v2.1.1 - branch `reviewdog`
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          files: ${{ steps.changed-files.outputs.all_changed_files }}
          # changed-files emits a space-separated list. Without a matching
          # separator, vale-action treats the whole string as one path, fails
          # to resolve it, and silently falls back to linting the entire repo.
          separator: " "
          version: 3.13.0
          # Exclude the generated schema reference pages. Vale parses .mdx through
          # mdx2vast, whose MDX pipeline doesn't treat GFM tables as tables — the
          # whole fields table collapses into one paragraph, backtick code spans
          # then pair across rows, and schema prose containing angle brackets
          # (`<contextId>`, `<os.tmpdir()>`) is parsed as JSX. That's a hard E100
          # runtime error, which fail_on_error can't downgrade. Fern renders the
          # same pages correctly, so this is a linter-parser limitation, not bad
          # content. The glob is belt-and-braces with files_ignore above: it also
          # covers vale-action's fallback to linting the whole repo when the
          # changed-file list is too long to resolve as a path.
          vale_flags: "--config=docs/.vale.ini --glob=!docs/fern/pages/reference/schemas/**"
          reporter: github-pr-review
          fail_on_error: false
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}