name: Build and Push Docker Images

on:
  pull_request:
    paths:
      - 'src/container/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build"
        required: true
        default: "latest"
        type: string
      no_cache:
        description: "Build without cache"
        type: boolean
        default: false
        required: false

concurrency:
  group: container-build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 60
    env:
      IMAGE_VERSION: ${{ inputs.version || 'latest' }}
    strategy:
      matrix:
        os:
          # Use windows-2022 for Windows container builds
          - windows-2022
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Switch Docker to Windows containers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Switching Docker to Windows containers..."
          
          # On GitHub Actions Windows runners, Docker Engine is installed (not Docker Desktop)
          # We need to reconfigure the Docker daemon to use Windows containers
          
          # Stop the Docker service
          Stop-Service docker -ErrorAction SilentlyContinue
          
          # Unregister and re-register the Docker service for Windows containers
          # This ensures Docker runs in Windows container mode
          $dockerd = (Get-Command dockerd -ErrorAction SilentlyContinue).Source
          if (-not $dockerd) {
            $dockerd = "$Env:ProgramFiles\Docker\dockerd.exe"
          }
          Write-Host "Using dockerd at: $dockerd"
          
          # Unregister existing service (ignore errors if it doesn't exist)
          & $dockerd --unregister-service 2>$null
          
          # Register the service fresh (Windows containers are the default on Windows Server)
          & $dockerd --register-service
          
          # Start the service
          Start-Service docker
          
          # Wait for Docker daemon to be ready
          $retries = 0
          $lastDockerInfoError = $null
          $os = $null
          while ($retries -lt 12) {
            Start-Sleep -Seconds 5
            $retries++
            $output = docker info --format '{{.OSType}}' 2>&1
            if ($LASTEXITCODE -eq 0) {
              # docker info may return multiple lines; use the last line for OSType
              $os = ($output | Select-Object -Last 1).ToString().Trim()
              Write-Host "Docker OSType: $os (attempt $retries)"
              if ($os -eq 'windows') { break }
            } else {
              # Preserve full multi-line output for diagnostics
              $lastDockerInfoError = ($output | Out-String).Trim()
              Write-Host "Docker not ready yet (attempt $retries): $lastDockerInfoError"
            }
          }
          if ($os -ne 'windows') {
            if (-not $os) { $os = 'unknown' }
            $details = if ($lastDockerInfoError) { "; last docker info error=$lastDockerInfoError" } else { "" }
            throw "Docker did not switch to Windows mode after waiting; last observed OSType=$os$details"
          }
          docker version
          docker info

      - name: Verify Windows container mode
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = docker info --format '{{.OSType}}'
          if ($os -ne 'windows') { throw "Docker is not in Windows mode; OSType=$os" }
          Write-Host "Docker OSType=$os"

      - name: Build Docker Image
        shell: bash
        run: npm run container:build -- --version="$IMAGE_VERSION" ${{ inputs.no_cache && '--no-cache' || '' }}

      - name: Post-build Test
        shell: bash
        env:
          VERSION: ${{ env.IMAGE_VERSION }}
        run: npm run container:test

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        run: |
          docker push --all-tags docdetective/docdetective
