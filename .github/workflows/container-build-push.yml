name: Build and Push Docker Images

on:
  repository_dispatch:
    types:
      - build-push
  pull_request:
    paths:
      - 'src/container/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build"
        required: true
        default: "latest"
        type: string
      no_cache:
        description: "Build without cache"
        type: boolean
        default: false
        required: false

concurrency:
  group: container-build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 60
    env:
      IMAGE_VERSION: ${{ github.event.client_payload.version || inputs.version || 'latest' }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Switch to Windows Docker Daemon
        if: runner.os == 'Windows'
        run: |
          echo "Switching to Windows Docker Daemon"
          $contextName = docker context ls | Select-String -Pattern "windows" | ForEach-Object { $_.ToString().Trim() -split '\s+' | Select-Object -First 1 }
          docker context use $contextName
          docker info

      - name: Build Docker Image
        shell: bash
        run: npm run container:build -- --version="$IMAGE_VERSION" ${{ inputs.no_cache && '--no-cache' || '' }}

      - name: Post-build Test
        shell: bash
        env:
          VERSION: ${{ env.IMAGE_VERSION }}
        run: npm run container:test

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        run: |
          docker push --all-tags docdetective/docdetective
