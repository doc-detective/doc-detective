name: Build and Push Docker Images

on:
  pull_request:
    paths:
      - 'src/container/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build"
        required: true
        default: "latest"
        type: string
      no_cache:
        description: "Build without cache"
        type: boolean
        default: false
        required: false

concurrency:
  group: container-build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 60
    env:
      IMAGE_VERSION: ${{ inputs.version || 'latest' }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Switch Docker to Windows containers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Switching Docker to Windows containers..."
          $dockerCli = "$Env:ProgramFiles\Docker\Docker\DockerCli.exe"
          if (-not (Test-Path $dockerCli)) {
            throw "DockerCli.exe not found at $dockerCli"
          }
          & $dockerCli -SwitchWindowsEngine
          Start-Sleep -Seconds 10
          docker version
          docker info

      - name: Verify Windows container mode
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = docker info --format '{{.OSType}}'
          if ($os -ne 'windows') { throw "Docker is not in Windows mode; OSType=$os" }
          Write-Host "Docker OSType=$os"

      - name: Build Docker Image
        shell: bash
        run: npm run container:build -- --version="$IMAGE_VERSION" ${{ inputs.no_cache && '--no-cache' || '' }}

      - name: Post-build Test
        shell: bash
        env:
          VERSION: ${{ env.IMAGE_VERSION }}
        run: npm run container:test

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && env.IMAGE_VERSION != 'latest'
        run: |
          docker push --all-tags docdetective/docdetective
